---
- name: Configure gateway cluster
  hosts: gateway
  tags: [ "gateway" ]
  gather_facts: true
  become: true

  pre_tasks:
    - name: package update
      include_tasks: tasks/update.yaml
      tags: [ "always" ]

  roles:
    - name: Setup system configuration role
      role: system_setup
      tags: [ "system" ]

    - name: Pre setup gateway configuration role
      role: gateway/pre_configuration
      tags: [ "gateway" ]

    - name: DHCP configuration role
      role: gateway/dhcp
      tags: [ "dhcp" ]

    - name: DNS configuration role
      role: gateway/dns
      tags: [ "dns" ]

    - name: NTP configuration role
      role: gateway/ntp
      tags: [ "ntp" ]

    - name: Firewall configuration role
      role: ipr-cnrs.nftables
      tags: [ "firewall" ]

- name: Configure external cluster
  hosts: external
  tags: [ "external" ]
  gather_facts: true
  become: true

  collections:
    - onepassword.connect

  vars:
    op_connect_token:

  environment:
    OP_CONNECT_TOKEN: "{{ lookup('env', 'OP_CONNECT_TOKEN') }}"
    OP_CONNECT_HOST: "{{ lookup('env', 'OP_CONNECT_HOST') }}"

  pre_tasks:
    - name: package update
      include_tasks: tasks/update.yaml
      tags: [ "always" ]

  roles:
    - name: Setup system configuration role
      role: system_setup
      tags: [ "system" ]

    - name: Pre setup external configuration role
      role: external/pre_configuration
      tags: [ "external" ]

    - name: Certbot configuration role
      role: external/certbot
      tags: [ "certbot" ]

    - name: Haproxy configuration role
      role: external/haproxy
      tags: [ "haproxy" ]

    - name: Minio configuration role
      role: external/minio
      tags: [ "minio" ]

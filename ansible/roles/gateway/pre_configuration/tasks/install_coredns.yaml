---
- name: Create CoreDNS config directory
  file:
    path: "/etc/coredns"
    state: directory
    mode: "0644"

- name: Set CoreDNS base variables
  set_fact:
    coredns_version: "1.11.3"
    os_arch: "arm64"

- name: Download CoreDNS archive
  get_url:
    url: "https://github.com/coredns/coredns/releases/download/v{{ coredns_version }}/coredns_{{ coredns_version }}_linux_{{ os_arch }}.tgz"
    dest: "{{ tmp_dir }}/coredns_{{ coredns_version }}_linux_{{ os_arch }}.tgz"
    owner: root
    group: root
    mode: "0644"

- name: "Extract CoreDNS to {{ tmp_dir }}"
  unarchive:
    src: "{{ tmp_dir }}/coredns_{{ coredns_version }}_linux_{{ os_arch }}.tgz"
    dest: "{{ tmp_dir }}"
    owner: root
    group: root
    remote_src: true

- name: "Copy CoreDNS binary to {{ install_dir }}"
  copy:
    src: "{{ item.source }}"
    dest: "{{ item.target }}"
    remote_src: true
    owner: root
    group: root
    mode: "0755"
  with_items:
    - source: "{{ tmp_dir }}/coredns"
      target: "{{ install_dir }}/coredns"

- name: Create CoreDNS systemd service file
  template:
    src: coredns.service.j2
    dest: /etc/systemd/system/coredns.service
    owner: root
    group: root
    mode: "0644"

- name: Reload systemd daemon
  systemd:
    daemon_reload: true

- name: Disable and Stop systemd-resolved
  systemd:
    name: systemd-resolved
    state: stopped
    enabled: false

- name: Enable and start CoreDNS
  systemd:
    name: coredns
    state: started
    enabled: true
